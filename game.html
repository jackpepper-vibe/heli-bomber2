<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>HELI-BOMBER</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #00ff41;
    }

    #game-container {
      position: relative;
      width: 920px;
      height: 520px;
      flex-shrink: 0;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    /* ── HUD overlay ──────────────────────────────────────────── */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: none;
      padding: 8px 14px;
      pointer-events: none;
      z-index: 10;
    }

    #hud.visible { display: flex; align-items: center; gap: 20px; }

    .hud-item { font-size: 13px; color: #00ff41; letter-spacing: 0.05em; }
    .hud-item span { color: #aaffbb; font-weight: bold; }
    .hud-item.warn span { color: #ffaa00; }
    .hud-item.empty span { color: #ff4400; }

    /* ── Level transition overlay ─────────────────────────────── */
    #level-transition {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.82);
      z-index: 20;
    }

    #level-transition.show { display: flex; }

    #lt-label {
      font-size: 14px;
      letter-spacing: 0.3em;
      color: #00aa28;
      margin-bottom: 4px;
    }

    #lt-num {
      font-size: 72px;
      font-weight: bold;
      color: #00ff41;
      text-shadow: 0 0 32px rgba(0,255,65,0.7);
      line-height: 1;
      margin-bottom: 10px;
    }

    #lt-sub {
      font-size: 13px;
      color: #aaffbb;
      letter-spacing: 0.1em;
      max-width: 480px;
      text-align: center;
    }

    /* ── Splash / Menu screen ─────────────────────────────────── */
    #splash {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 30;
    }

    .splash-title {
      font-size: 52px;
      font-weight: bold;
      color: #00ff41;
      text-shadow: 0 0 40px rgba(0,255,65,0.8);
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .splash-sub {
      font-size: 12px;
      color: #00aa28;
      letter-spacing: 0.3em;
      margin-bottom: 32px;
    }

    .splash-input {
      background: #000;
      border: 1px solid #00ff41;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      padding: 8px 16px;
      outline: none;
      width: 220px;
      text-align: center;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .splash-input::placeholder { color: #004a10; }

    .btn {
      background: #000;
      border: 1px solid #00ff41;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 9px 28px;
      cursor: pointer;
      letter-spacing: 0.2em;
      transition: background 0.15s, color 0.15s, box-shadow 0.15s;
    }

    .btn:hover {
      background: #00ff41;
      color: #000;
      box-shadow: 0 0 22px rgba(0,255,65,0.55);
    }

    #splash-scores {
      margin-top: 28px;
      width: 440px;
      border-top: 1px solid #002200;
      padding-top: 16px;
    }

    .scores-title {
      font-size: 10px;
      color: #00aa28;
      letter-spacing: 0.3em;
      margin-bottom: 10px;
      text-align: center;
    }

    .scores-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 20px;
    }

    .score-row {
      display: flex;
      gap: 8px;
      font-size: 12px;
      padding: 2px 0;
      color: #007a20;
    }

    .score-row.hi { color: #00ff41; }
    .score-row .rk { color: #004a10; width: 22px; }
    .score-row .nm { flex: 1; }
    .score-row .pts { color: #aaffbb; }
    .no-scores { color: #003a10; font-size: 11px; text-align: center; padding: 8px; }

    /* ── Heli select ─────────────────────────────────────────── */
    #heli-select {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 30;
    }

    #heli-select.visible { display: flex; }

    .hs-title {
      font-size: 13px;
      letter-spacing: 0.3em;
      color: #00aa28;
      margin-bottom: 24px;
    }

    .heli-cards {
      display: flex;
      gap: 24px;
      margin-bottom: 28px;
    }

    .heli-card {
      width: 190px;
      border: 1px solid #003a10;
      padding: 16px;
      cursor: pointer;
      background: #000;
      transition: border-color 0.15s, box-shadow 0.15s;
      text-align: center;
    }

    .heli-card:hover, .heli-card.selected {
      border-color: #00ff41;
      box-shadow: 0 0 18px rgba(0,255,65,0.3);
    }

    .heli-card canvas { display: block; margin: 0 auto 10px; }

    .heli-card-name { font-size: 13px; color: #00ff41; margin-bottom: 4px; letter-spacing: 0.1em; }
    .heli-card-stat { font-size: 11px; color: #007a20; margin-bottom: 2px; }

    /* ── Game over ────────────────────────────────────────────── */
    #gameover {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.9);
      z-index: 30;
    }

    #gameover.show { display: flex; }

    .go-title {
      font-size: 36px;
      font-weight: bold;
      color: #ff4400;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      text-shadow: 0 0 24px rgba(255,68,0,0.6);
    }

    .go-score {
      font-size: 14px;
      color: #aaffbb;
      margin-bottom: 4px;
    }

    .go-score span { color: #00ff41; font-weight: bold; font-size: 18px; }

    #go-rank-msg {
      font-size: 12px;
      color: #ffff44;
      letter-spacing: 0.15em;
      margin-bottom: 24px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-item">PILOT: <span id="hud-name">ACE</span></div>
      <div class="hud-item">SCORE: <span id="hud-score">0</span></div>
      <div class="hud-item">LVL: <span id="hud-level-num">1</span></div>
      <div class="hud-item">DIST: <span id="hud-timer">—</span></div>
      <div class="hud-item" id="hud-bombs-wrap">BOMBS: <span id="hud-bombs">—</span></div>
    </div>

    <!-- Level transition -->
    <div id="level-transition">
      <div id="lt-label">LEVEL</div>
      <div id="lt-num">1</div>
      <div id="lt-sub">MISSION START — GO GO GO</div>
    </div>

    <!-- Splash / title screen -->
    <div id="splash">
      <div class="splash-title">HELI-BOMBER</div>
      <div class="splash-sub">CLASSIFIED STRIKE MISSION</div>
      <input id="player-name" class="splash-input" type="text" maxlength="12" placeholder="ENTER PILOT NAME" spellcheck="false" />
      <button id="start-btn" class="btn">LAUNCH MISSION</button>
      <div id="splash-scores">
        <div class="scores-title">LEADERBOARD</div>
        <div id="splash-scores-list"></div>
      </div>
    </div>

    <!-- Heli select -->
    <div id="heli-select">
      <div class="hs-title">SELECT YOUR AIRCRAFT</div>
      <div class="heli-cards" id="heli-cards"></div>
      <button id="launch-btn" class="btn">COMMENCE STRIKE</button>
    </div>

    <!-- Game over -->
    <div id="gameover">
      <div class="go-title">MISSION FAILED</div>
      <div class="go-score">FINAL SCORE: <span id="go-score-val">0</span></div>
      <div id="go-rank-msg"></div>
      <div id="go-scores-list" style="width:440px; margin-bottom:24px;"></div>
      <button id="restart-btn" class="btn">NEW MISSION</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
