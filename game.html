<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>HELI-BOMBER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      width: 100vw;
      height: 100dvh;
      height: 100vh; /* fallback */
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #00ff41;
      position: relative;
    }

    #game-container {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 920px;
      height: 520px;
      transform-origin: center center;
      transform: translate(-50%, -50%);
    }

    /* ── Rotate-to-landscape prompt ───────────────────────────── */
    #rotate-prompt {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      font-family: 'Courier New', monospace;
    }

    #rotate-prompt .rp-icon {
      font-size: 64px;
      animation: spin90 1.6s ease-in-out infinite alternate;
      display: inline-block;
      color: #00ff41;
      text-shadow: 0 0 24px rgba(0,255,65,0.6);
    }

    @keyframes spin90 {
      0%   { transform: rotate(0deg);   }
      100% { transform: rotate(90deg);  }
    }

    #rotate-prompt .rp-title {
      font-size: 22px;
      font-weight: bold;
      color: #00ff41;
      letter-spacing: 0.2em;
      text-shadow: 0 0 20px rgba(0,255,65,0.5);
    }

    #rotate-prompt .rp-sub {
      font-size: 12px;
      color: #007a20;
      letter-spacing: 0.15em;
    }

    /* ── Mobile touch controls ────────────────────────────────── */
    #touch-controls {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 15;
      display: none;
    }

    .dp-btn {
      position: absolute;
      pointer-events: all;
      width: 60px;
      height: 60px;

      /* ── Brushed steel military panel ── */
      /* Layer 1: micro-groove brush lines (92° = near-horizontal, slight variation) */
      /* Layer 2: angular lighting gradient (155° = upper-left to lower-right) */
      /* Layer 3: dark military-steel base tint */
      background:
        repeating-linear-gradient(
          92deg,
          transparent                   0px,
          transparent                   1.6px,
          rgba(255,255,255,0.028)       1.6px,
          rgba(255,255,255,0.028)       2.1px,
          transparent                   2.1px,
          transparent                   4.8px
        ),
        linear-gradient(
          155deg,
          rgba(188,212,248,0.22)  0%,
          rgba(122,158,210,0.13) 28%,
          rgba(68, 98,158,0.20)  54%,
          rgba(138,174,222,0.14) 78%,
          rgba(200,220,252,0.18) 100%
        ),
        rgba(14,26,52,0.88);

      /* Machined-edge border — top/left bright, bottom/right dark */
      border: 1.5px solid rgba(90,130,195,0.32);
      border-top-color:    rgba(175,210,255,0.48);
      border-left-color:   rgba(155,195,250,0.42);
      border-bottom-color: rgba(30, 52,110,0.58);
      border-right-color:  rgba(30, 52,110,0.52);
      border-radius: 10px;

      /* Deep chamfered bevel: bright top-left edge, shadow bottom-right */
      box-shadow:
        inset  1px  1px 0   rgba(210,230,255,0.32),
        inset -1px -1px 0   rgba(0,0,0,0.48),
        inset  2px  2px 5px rgba(255,255,255,0.07),
        inset -2px -2px 5px rgba(0,0,0,0.28),
        0 3px 9px  rgba(0,0,0,0.58),
        0 1px 2px  rgba(0,0,0,0.42);

      display: flex;
      align-items: center;
      justify-content: center;

      /* Arrow icon — etched into the surface (carved recess effect) */
      color: rgba(115,158,230,0.92);
      font-size: 20px;
      text-shadow:
        0  1px 0   rgba(205,228,255,0.30),
        0 -1px 0   rgba(0,0,0,0.58),
        0  0   5px rgba(72,125,228,0.16);

      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      transition: box-shadow 0.08s, border-color 0.08s;
    }

    .dp-btn:active {
      background:
        repeating-linear-gradient(
          92deg,
          transparent                  0px,
          transparent                  1.6px,
          rgba(255,255,255,0.018)      1.6px,
          rgba(255,255,255,0.018)      2.1px,
          transparent                  2.1px,
          transparent                  4.8px
        ),
        linear-gradient(
          155deg,
          rgba(115,148,208,0.18)  0%,
          rgba(78,110,168,0.12)  40%,
          rgba(46, 72,125,0.18)  60%,
          rgba(108,145,202,0.14) 100%
        ),
        rgba(10,20,44,0.94);

      /* Inverted bevel = pressed down */
      box-shadow:
        inset -1px -1px 0   rgba(205,228,255,0.18),
        inset  1px  1px 0   rgba(0,0,0,0.50),
        inset  3px  3px 9px rgba(0,0,0,0.48),
        inset -2px -2px 4px rgba(255,255,255,0.05),
        0 1px 3px rgba(0,0,0,0.38);

      border-top-color:    rgba(30, 52,110,0.58);
      border-left-color:   rgba(30, 52,110,0.52);
      border-bottom-color: rgba(155,195,250,0.42);
      border-right-color:  rgba(175,210,255,0.48);

      text-shadow:
        0 -1px 0 rgba(205,228,255,0.24),
        0  1px 0 rgba(0,0,0,0.58);
    }

    #dp-up    { bottom: 124px; left:  68px; }
    #dp-down  { bottom:  58px; left:  68px; }
    #dp-left  { bottom:  91px; left:   4px; }
    #dp-right { bottom:  91px; left: 132px; }

    #fire-btn {
      position: absolute;
      pointer-events: all;
      bottom: 54px;
      right: 18px;
      width: 92px;
      height: 92px;

      /* ── Machined amber-metal cockpit dome ── */
      /* Layer 1: concentric ring texture (lathe-turned finish) */
      /* Layer 2: dome radial gradient — light upper-left, shadow lower-right */
      /* Layer 3: deep dark amber base */
      background:
        repeating-radial-gradient(
          circle at 50% 50%,
          transparent                0px,
          transparent                4.2px,
          rgba(245,148,35,0.040)     4.2px,
          rgba(245,148,35,0.040)     4.8px,
          transparent                4.8px,
          transparent               10px
        ),
        radial-gradient(
          ellipse at 38% 33%,
          rgba(255,218,115,0.34)  0%,
          rgba(242,162, 52,0.24) 28%,
          rgba(188, 88, 12,0.30) 60%,
          rgba(105, 36,  4,0.44) 100%
        ),
        rgba(30,13,3,0.92);

      border-radius: 50%;

      /* Machined ring edge — bright top-left, dark bottom-right */
      border: 2px solid rgba(152,85,18,0.62);
      border-top-color:    rgba(255,205,82,0.62);
      border-left-color:   rgba(242,172,58,0.56);
      border-bottom-color: rgba(75, 28, 4,0.72);
      border-right-color:  rgba(75, 28, 4,0.66);

      /* Deep bevel + warm ambient glow */
      box-shadow:
        inset  1px  1px 0   rgba(255,225,105,0.34),
        inset -1px -1px 0   rgba(55, 16,  2,0.58),
        inset  2px  2px 6px rgba(255,185, 65,0.14),
        inset -3px -3px 8px rgba(0,0,0,0.42),
        0 0  20px rgba(218,108,  0,0.24),
        0 0  42px rgba(218, 88,  0,0.10),
        0 4px 14px rgba(0,0,0,0.58);

      display: flex;
      align-items: center;
      justify-content: center;

      /* ── FIRE text — embossed raised relief ── */
      /* Base color matches the shadowed side of raised metal letters.
         Top highlight (0 1px) = light catching the tops of raised glyphs.
         Bottom shadow (0 -1px) = cast shadow below raised edges. */
      color: rgba(92,40,6,0.78);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 14px;
      font-weight: normal;
      letter-spacing: 0.20em;
      text-shadow:
        0  1px 1px rgba(255,218,90,0.72),
        0 -1px 0   rgba(35, 10, 0,0.68),
        0  0   6px rgba(210,132,22,0.28);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;

      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      transition: box-shadow 0.08s, border-color 0.08s;
    }

    #fire-btn:active {
      background:
        repeating-radial-gradient(
          circle at 50% 50%,
          transparent              0px,
          transparent              4.2px,
          rgba(245,148,35,0.030)   4.2px,
          rgba(245,148,35,0.030)   4.8px,
          transparent              4.8px,
          transparent             10px
        ),
        radial-gradient(
          ellipse at 48% 48%,
          rgba(218,178,72,0.28) 0%,
          rgba(195,122,30,0.20) 35%,
          rgba(145, 62, 8,0.28) 65%,
          rgba( 82, 28, 2,0.42) 100%
        ),
        rgba(24,10,2,0.96);

      /* Inverted bevel = depressed */
      box-shadow:
        inset -1px -1px 0   rgba(255,218,88,0.22),
        inset  1px  1px 0   rgba(55, 16, 2,0.58),
        inset  4px  4px 11px rgba(0,0,0,0.58),
        inset -2px -2px 5px rgba(255,185,65,0.08),
        0 0  36px rgba(255,132,  0,0.52),
        0 0  65px rgba(255, 88,  0,0.20),
        0 2px  5px rgba(0,0,0,0.38);

      border-top-color:    rgba(75, 28, 4,0.72);
      border-left-color:   rgba(75, 28, 4,0.66);
      border-bottom-color: rgba(242,172,58,0.56);
      border-right-color:  rgba(255,205,82,0.62);

      /* Text lifts visually when button depresses — invert bevel direction */
      color: rgba(255,195,62,0.92);
      text-shadow:
        0 -1px 0   rgba(255,225,108,0.62),
        0  1px 1px rgba(35, 10,  0,0.72),
        0  0  12px rgba(255,162, 30,0.58);
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    /* CRT screen glow border */
    #game-container {
      box-shadow:
        0 0 0 1px #001a08,
        0 0 18px rgba(0,255,65,0.25),
        0 0 60px rgba(0,255,65,0.10),
        0 0 140px rgba(0,255,65,0.05);
      outline: 1px solid rgba(0,255,65,0.15);
    }

    /* Scanline + vignette overlay — sits over the canvas, under the HUD */
    #screen-fx {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 8;
      /* Clean vignette only — no CRT scanlines */
      box-shadow:
        inset 0 0  50px rgba(0,0,0,0.30),
        inset 0 0 110px rgba(0,0,0,0.15),
        inset 0 0 180px rgba(0,0,0,0.08);
    }

    /* ── HUD overlay ──────────────────────────────────────────── */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: none;
      padding: 7px 14px 20px;
      pointer-events: none;
      z-index: 10;
      /* Gradient header panel — fades out downward */
      background: linear-gradient(to bottom, rgba(0,6,2,0.64) 0%, rgba(0,6,2,0) 100%);
    }

    #hud.visible { display: flex; align-items: center; gap: 22px; }

    /* HiDPI-optimised terminal font */
    .hud-item {
      font-family: 'Share Tech Mono', 'SF Mono', ui-monospace, 'Cascadia Code',
                   'Fira Code', 'Inconsolata', 'Courier New', monospace;
      font-size: 13px;
      font-weight: normal;
      color: rgba(0,205,48,0.82);
      letter-spacing: 0.08em;
      /* GPU-composited layer for sharp HiDPI rendering */
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: geometricPrecision;
      /* CRT phosphor glow: thin outer halo + hard drop shadow for legibility */
      text-shadow:
        0 0 6px  rgba(0,255,65,0.35),
        0 1px 0  rgba(0,0,0,0.85);
    }

    /* Value spans — brighter, tabular numerals prevent score reflow */
    .hud-item span {
      color: #00ff41;
      font-variant-numeric: tabular-nums;
      text-shadow:
        0 0 8px  rgba(0,255,65,0.50),
        0 1px 0  rgba(0,0,0,0.85);
    }

    .hud-item.warn  span {
      color: #ffb020;
      text-shadow: 0 0 8px rgba(255,165,0,0.55), 0 1px 0 rgba(0,0,0,0.85);
    }
    .hud-item.empty span {
      color: #ff5218;
      text-shadow: 0 0 8px rgba(255,82,0,0.58),  0 1px 0 rgba(0,0,0,0.85);
    }

    /* ── Level transition overlay ─────────────────────────────── */
    #level-transition {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.82);
      z-index: 20;
    }

    #level-transition.show { display: flex; }

    #lt-label {
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 14px;
      letter-spacing: 0.3em;
      color: #00aa28;
      margin-bottom: 4px;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    #lt-num {
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 72px;
      font-weight: normal;
      color: #00ff41;
      text-shadow: 0 0 32px rgba(0,255,65,0.7), 0 0 4px rgba(0,255,65,0.4);
      line-height: 1;
      margin-bottom: 10px;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    #lt-sub {
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 13px;
      color: #aaffbb;
      letter-spacing: 0.1em;
      max-width: 480px;
      text-align: center;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    /* ── Splash / Menu screen ─────────────────────────────────── */
    #splash {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(
        to bottom,
        #0e2040 0%,
        #1a3e6e 13%,
        #2e72a8 28%,
        #58a0cc 46%,
        #96c8e0 64%,
        #d4e8c8 79%,
        #e8d898 90%,
        #d8c070 100%
      );
      z-index: 30;
    }

    .splash-title {
      font-size: 52px;
      font-weight: bold;
      color: #fff8e0;
      text-shadow: 0 0 40px rgba(255,196,48,0.75), 0 0 90px rgba(255,140,0,0.35), 0 2px 0 rgba(0,0,0,0.45);
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .title-num {
      color: #ffd060;
      text-shadow: 0 0 30px rgba(255,210,60,1.0), 0 0 70px rgba(255,160,0,0.7), 0 2px 0 rgba(0,0,0,0.45);
    }

    .splash-sub {
      font-size: 12px;
      color: rgba(200,230,255,0.7);
      letter-spacing: 0.3em;
      margin-bottom: 32px;
    }

    .splash-input {
      background: rgba(14,32,64,0.65);
      border: 1px solid rgba(255,196,60,0.55);
      color: #fff8e0;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      padding: 8px 16px;
      outline: none;
      width: 220px;
      text-align: center;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .splash-input::placeholder { color: rgba(255,196,60,0.3); }

    .btn {
      background: #000;
      border: 1px solid #00ff41;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 9px 28px;
      cursor: pointer;
      letter-spacing: 0.2em;
      transition: background 0.15s, color 0.15s, box-shadow 0.15s;
    }

    .btn:hover {
      background: #00ff41;
      color: #000;
      box-shadow: 0 0 22px rgba(0,255,65,0.55);
    }

    /* Splash-scoped button overrides (day palette) */
    #splash .btn {
      background: rgba(14,32,64,0.55);
      border: 1px solid rgba(255,196,60,0.55);
      color: #fff8e0;
    }

    #splash .btn:hover {
      background: rgba(255,196,60,0.85);
      color: #0e2040;
      box-shadow: 0 0 24px rgba(255,196,60,0.65);
    }

    #splash-scores {
      margin-top: 28px;
      width: 440px;
      border-top: 1px solid rgba(255,196,60,0.18);
      padding-top: 16px;
    }

    .scores-title {
      font-size: 10px;
      color: rgba(200,230,255,0.65);
      letter-spacing: 0.3em;
      margin-bottom: 10px;
      text-align: center;
    }

    .scores-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 20px;
    }

    .score-row {
      display: flex;
      gap: 8px;
      font-size: 12px;
      padding: 2px 0;
      color: rgba(200,220,255,0.45);
    }

    .score-row.hi { color: #ffd060; }
    .score-row .rk { color: rgba(255,196,60,0.28); width: 22px; }
    .score-row .nm { flex: 1; }
    .score-row .pts { color: rgba(255,240,180,0.75); }
    .no-scores { color: rgba(255,196,60,0.28); font-size: 11px; text-align: center; padding: 8px; }

    /* ── Heli select ─────────────────────────────────────────── */
    #heli-select {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(
        to bottom,
        #0e2040 0%,
        #1a3e6e 13%,
        #2e72a8 28%,
        #58a0cc 46%,
        #96c8e0 64%,
        #d4e8c8 79%,
        #e8d898 90%,
        #d8c070 100%
      );
      z-index: 30;
    }

    #heli-select.visible { display: flex; }

    .hs-header {
      text-align: center;
      margin-bottom: 22px;
    }

    .hs-main-title {
      font-size: 30px;
      font-weight: bold;
      color: #fff8e0;
      text-shadow: 0 0 28px rgba(255,196,48,0.55), 0 0 70px rgba(255,140,0,0.25), 0 2px 0 rgba(0,0,0,0.40);
      letter-spacing: 0.10em;
      margin-bottom: 4px;
    }

    .hs-subtitle {
      font-size: 11px;
      color: rgba(200,230,255,0.65);
      letter-spacing: 0.35em;
      margin-bottom: 8px;
    }

    .hs-pilot-pill {
      display: inline-block;
      font-size: 10px;
      color: rgba(255,210,120,0.75);
      letter-spacing: 0.20em;
      background: rgba(14,32,64,0.50);
      border: 1px solid rgba(255,196,60,0.28);
      border-radius: 20px;
      padding: 3px 14px;
    }

    .heli-cards {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
    }

    .heli-card {
      width: 210px;
      background: rgba(8,18,38,0.62);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,196,60,0.22);
      border-top-color: rgba(255,220,100,0.32);
      border-radius: 8px;
      padding: 16px 14px 14px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .heli-card:hover {
      background: rgba(14,32,64,0.78);
      border-color: rgba(255,196,60,0.52);
      box-shadow: 0 4px 18px rgba(0,0,0,0.40), 0 0 20px rgba(255,196,60,0.14);
    }

    .heli-card.selected {
      background: rgba(14,32,64,0.85);
      border-color: rgba(255,196,60,0.85);
      border-top-color: rgba(255,228,120,0.95);
      box-shadow: 0 4px 22px rgba(0,0,0,0.45), 0 0 30px rgba(255,196,60,0.28), inset 0 0 18px rgba(255,196,60,0.05);
    }

    .heli-card canvas {
      display: block;
      margin: 0 auto 12px;
      max-width: 100%;
      border-radius: 4px;
      background: rgba(4,10,22,0.75);
      border: 1px solid rgba(255,196,60,0.10);
    }

    .heli-card-name {
      font-size: 13px;
      font-weight: bold;
      color: #fff8e0;
      letter-spacing: 0.18em;
      margin-bottom: 10px;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 9px;
      color: rgba(200,220,255,0.55);
      letter-spacing: 0.12em;
      width: 44px;
      text-align: left;
      flex-shrink: 0;
    }

    .stat-track {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid rgba(255,196,60,0.12);
    }

    .stat-fill {
      height: 100%;
      background: linear-gradient(to right, rgba(200,160,40,0.85), rgba(255,210,60,0.95));
      border-radius: 3px;
      box-shadow: 0 0 6px rgba(255,196,60,0.40);
    }

    .heli-card-desc {
      font-size: 10px;
      color: rgba(200,220,255,0.42);
      letter-spacing: 0.10em;
      margin-top: 8px;
      border-top: 1px solid rgba(255,196,60,0.10);
      padding-top: 7px;
    }

    /* Heli select button (day palette) */
    #heli-select .btn {
      background: rgba(14,32,64,0.55);
      border: 1px solid rgba(255,196,60,0.55);
      color: #fff8e0;
    }

    #heli-select .btn:hover {
      background: rgba(255,196,60,0.85);
      color: #0e2040;
      box-shadow: 0 0 24px rgba(255,196,60,0.65);
    }

    /* ── Game over ────────────────────────────────────────────── */
    #gameover {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.9);
      z-index: 30;
    }

    #gameover.show { display: flex; }

    .go-title {
      font-size: 36px;
      font-weight: bold;
      color: #ff4400;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      text-shadow: 0 0 24px rgba(255,68,0,0.6);
    }

    .go-score {
      font-size: 14px;
      color: #aaffbb;
      margin-bottom: 4px;
    }

    .go-score span { color: #00ff41; font-weight: bold; font-size: 18px; }

    #go-rank-msg {
      font-size: 12px;
      color: #ffff44;
      letter-spacing: 0.15em;
      margin-bottom: 24px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <!-- Rotate-to-landscape prompt (fixed fullscreen overlay) -->
  <div id="rotate-prompt">
    <div class="rp-icon">📱</div>
    <div class="rp-title">ROTATE DEVICE</div>
    <div class="rp-sub">HELI-BOMBER REQUIRES LANDSCAPE MODE</div>
  </div>

  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-item">PILOT: <span id="hud-name">ACE</span></div>
      <div class="hud-item">SCORE: <span id="hud-score">0</span></div>
      <div class="hud-item">LVL: <span id="hud-level-num">1</span></div>
      <div class="hud-item">DIST: <span id="hud-timer">—</span></div>
      <div class="hud-item" id="hud-bombs-wrap">BOMBS: <span id="hud-bombs">—</span></div>
    </div>

    <!-- Level transition -->
    <div id="level-transition">
      <div id="lt-label">LEVEL</div>
      <div id="lt-num">1</div>
      <div id="lt-sub">MISSION START — GO GO GO</div>
    </div>

    <!-- Splash / title screen -->
    <div id="splash">
      <div class="splash-title">HELI BOMBER <span class="title-num">2</span></div>
      <div class="splash-sub">CLASSIFIED STRIKE MISSION</div>
      <input id="player-name" class="splash-input" type="text" maxlength="12" placeholder="ENTER PILOT NAME" spellcheck="false" />
      <button id="start-btn" class="btn">LAUNCH MISSION</button>
      <div id="splash-scores">
        <div class="scores-title">LEADERBOARD</div>
        <div id="splash-scores-list"></div>
      </div>
    </div>

    <!-- Heli select -->
    <div id="heli-select">
      <div class="hs-header">
        <div class="hs-main-title">HELI BOMBER <span class="title-num">2</span></div>
        <div class="hs-subtitle">SELECT YOUR AIRCRAFT</div>
        <div class="hs-pilot-pill">PILOT: <span id="hs-pilot-name">ACE</span></div>
      </div>
      <div class="heli-cards" id="heli-cards"></div>
      <button id="launch-btn" class="btn">COMMENCE STRIKE</button>
    </div>

    <!-- Touch controls (mobile d-pad + fire) -->
    <div id="touch-controls">
      <button class="dp-btn" id="dp-up">▲</button>
      <button class="dp-btn" id="dp-down">▼</button>
      <button class="dp-btn" id="dp-left">◀</button>
      <button class="dp-btn" id="dp-right">▶</button>
      <button id="fire-btn">FIRE</button>
    </div>

    <!-- CRT scanline / vignette overlay -->
    <div id="screen-fx"></div>

    <!-- Game over -->
    <div id="gameover">
      <div class="go-title">MISSION FAILED</div>
      <div class="go-score">FINAL SCORE: <span id="go-score-val">0</span></div>
      <div id="go-rank-msg"></div>
      <div id="go-scores-list" style="width:440px; margin-bottom:24px;"></div>
      <button id="restart-btn" class="btn">NEW MISSION</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>

  <script>
    (function () {
      const GAME_W = 920, GAME_H = 520;
      const container   = document.getElementById('game-container');
      const rotatePrompt = document.getElementById('rotate-prompt');
      const touchControls = document.getElementById('touch-controls');

      function isPortrait() {
        // Use innerWidth/Height — works in all mobile browsers
        return window.innerHeight > window.innerWidth;
      }

      function isTouchDevice() {
        return navigator.maxTouchPoints > 0 || 'ontouchstart' in window;
      }

      function resize() {
        const portrait = isPortrait();

        // Show rotate prompt on portrait touch devices; hide otherwise
        if (isTouchDevice() && portrait) {
          rotatePrompt.style.display = 'flex';
          return; // don't scale while portrait
        }
        rotatePrompt.style.display = 'none';

        // Show touch controls only on touch devices in landscape
        if (isTouchDevice()) {
          touchControls.style.display = 'block';
        }

        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const scale = Math.min(vw / GAME_W, vh / GAME_H);

        container.style.transform =
          'translate(-50%, -50%) scale(' + scale + ')';
      }

      window.addEventListener('resize',            resize, { passive: true });
      window.addEventListener('orientationchange', resize, { passive: true });
      resize();
    })();
  </script>
</body>
</html>
