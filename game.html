<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>HELI-BOMBER</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      width: 100vw;
      height: 100dvh;
      height: 100vh; /* fallback */
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #00ff41;
      position: relative;
    }

    #game-container {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 920px;
      height: 520px;
      transform-origin: center center;
      transform: translate(-50%, -50%);
    }

    /* ── Rotate-to-landscape prompt ───────────────────────────── */
    #rotate-prompt {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      font-family: 'Courier New', monospace;
    }

    #rotate-prompt .rp-icon {
      font-size: 64px;
      animation: spin90 1.6s ease-in-out infinite alternate;
      display: inline-block;
      color: #00ff41;
      text-shadow: 0 0 24px rgba(0,255,65,0.6);
    }

    @keyframes spin90 {
      0%   { transform: rotate(0deg);   }
      100% { transform: rotate(90deg);  }
    }

    #rotate-prompt .rp-title {
      font-size: 22px;
      font-weight: bold;
      color: #00ff41;
      letter-spacing: 0.2em;
      text-shadow: 0 0 20px rgba(0,255,65,0.5);
    }

    #rotate-prompt .rp-sub {
      font-size: 12px;
      color: #007a20;
      letter-spacing: 0.15em;
    }

    /* ── Mobile touch controls ────────────────────────────────── */
    #touch-controls {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 15;
      display: none;
    }

    .dp-btn {
      position: absolute;
      pointer-events: all;
      width: 60px;
      height: 60px;
      background: rgba(0,255,65,0.07);
      border: 1px solid rgba(0,255,65,0.22);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(0,255,65,0.45);
      font-size: 22px;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.08s;
    }

    .dp-btn:active { background: rgba(0,255,65,0.20); border-color: rgba(0,255,65,0.5); }

    #dp-up    { bottom: 124px; left:  68px; }
    #dp-down  { bottom:  58px; left:  68px; }
    #dp-left  { bottom:  91px; left:   4px; }
    #dp-right { bottom:  91px; left: 132px; }

    #fire-btn {
      position: absolute;
      pointer-events: all;
      bottom: 54px;
      right: 18px;
      width: 92px;
      height: 92px;
      background: rgba(0,255,65,0.08);
      border: 2px solid rgba(0,255,65,0.30);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(0,255,65,0.5);
      font-size: 13px;
      letter-spacing: 0.05em;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.08s;
    }

    #fire-btn:active { background: rgba(255,100,0,0.25); border-color: rgba(255,100,0,0.6); color: #ff8800; }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    /* CRT screen glow border */
    #game-container {
      box-shadow:
        0 0 0 1px #001a08,
        0 0 18px rgba(0,255,65,0.25),
        0 0 60px rgba(0,255,65,0.10),
        0 0 140px rgba(0,255,65,0.05);
      outline: 1px solid rgba(0,255,65,0.15);
    }

    /* Scanline + vignette overlay — sits over the canvas, under the HUD */
    #screen-fx {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 8;
      /* Scanlines */
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(0,0,0,0.10) 3px,
          rgba(0,0,0,0.10) 4px
        );
      /* Vignette using box-shadow inset */
      box-shadow:
        inset 0 0  60px rgba(0,0,0,0.50),
        inset 0 0 120px rgba(0,0,0,0.30),
        inset 0 0 200px rgba(0,0,0,0.15);
    }

    /* ── HUD overlay ──────────────────────────────────────────── */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: none;
      padding: 8px 14px;
      pointer-events: none;
      z-index: 10;
    }

    #hud.visible { display: flex; align-items: center; gap: 20px; }

    .hud-item { font-size: 13px; color: #00ff41; letter-spacing: 0.05em; }
    .hud-item span { color: #aaffbb; font-weight: bold; }
    .hud-item.warn span { color: #ffaa00; }
    .hud-item.empty span { color: #ff4400; }

    /* ── Level transition overlay ─────────────────────────────── */
    #level-transition {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.82);
      z-index: 20;
    }

    #level-transition.show { display: flex; }

    #lt-label {
      font-size: 14px;
      letter-spacing: 0.3em;
      color: #00aa28;
      margin-bottom: 4px;
    }

    #lt-num {
      font-size: 72px;
      font-weight: bold;
      color: #00ff41;
      text-shadow: 0 0 32px rgba(0,255,65,0.7);
      line-height: 1;
      margin-bottom: 10px;
    }

    #lt-sub {
      font-size: 13px;
      color: #aaffbb;
      letter-spacing: 0.1em;
      max-width: 480px;
      text-align: center;
    }

    /* ── Splash / Menu screen ─────────────────────────────────── */
    #splash {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 30;
    }

    .splash-title {
      font-size: 52px;
      font-weight: bold;
      color: #00ff41;
      text-shadow: 0 0 40px rgba(0,255,65,0.8);
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .splash-sub {
      font-size: 12px;
      color: #00aa28;
      letter-spacing: 0.3em;
      margin-bottom: 32px;
    }

    .splash-input {
      background: #000;
      border: 1px solid #00ff41;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      padding: 8px 16px;
      outline: none;
      width: 220px;
      text-align: center;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .splash-input::placeholder { color: #004a10; }

    .btn {
      background: #000;
      border: 1px solid #00ff41;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 9px 28px;
      cursor: pointer;
      letter-spacing: 0.2em;
      transition: background 0.15s, color 0.15s, box-shadow 0.15s;
    }

    .btn:hover {
      background: #00ff41;
      color: #000;
      box-shadow: 0 0 22px rgba(0,255,65,0.55);
    }

    #splash-scores {
      margin-top: 28px;
      width: 440px;
      border-top: 1px solid #002200;
      padding-top: 16px;
    }

    .scores-title {
      font-size: 10px;
      color: #00aa28;
      letter-spacing: 0.3em;
      margin-bottom: 10px;
      text-align: center;
    }

    .scores-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 20px;
    }

    .score-row {
      display: flex;
      gap: 8px;
      font-size: 12px;
      padding: 2px 0;
      color: #007a20;
    }

    .score-row.hi { color: #00ff41; }
    .score-row .rk { color: #004a10; width: 22px; }
    .score-row .nm { flex: 1; }
    .score-row .pts { color: #aaffbb; }
    .no-scores { color: #003a10; font-size: 11px; text-align: center; padding: 8px; }

    /* ── Heli select ─────────────────────────────────────────── */
    #heli-select {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 30;
    }

    #heli-select.visible { display: flex; }

    .hs-title {
      font-size: 13px;
      letter-spacing: 0.3em;
      color: #00aa28;
      margin-bottom: 24px;
    }

    .heli-cards {
      display: flex;
      gap: 24px;
      margin-bottom: 28px;
    }

    .heli-card {
      width: 190px;
      border: 1px solid #003a10;
      padding: 16px;
      cursor: pointer;
      background: #000;
      transition: border-color 0.15s, box-shadow 0.15s;
      text-align: center;
    }

    .heli-card:hover, .heli-card.selected {
      border-color: #00ff41;
      box-shadow: 0 0 18px rgba(0,255,65,0.3);
    }

    .heli-card canvas { display: block; margin: 0 auto 10px; }

    .heli-card-name { font-size: 13px; color: #00ff41; margin-bottom: 4px; letter-spacing: 0.1em; }
    .heli-card-stat { font-size: 11px; color: #007a20; margin-bottom: 2px; }

    /* ── Game over ────────────────────────────────────────────── */
    #gameover {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.9);
      z-index: 30;
    }

    #gameover.show { display: flex; }

    .go-title {
      font-size: 36px;
      font-weight: bold;
      color: #ff4400;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      text-shadow: 0 0 24px rgba(255,68,0,0.6);
    }

    .go-score {
      font-size: 14px;
      color: #aaffbb;
      margin-bottom: 4px;
    }

    .go-score span { color: #00ff41; font-weight: bold; font-size: 18px; }

    #go-rank-msg {
      font-size: 12px;
      color: #ffff44;
      letter-spacing: 0.15em;
      margin-bottom: 24px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <!-- Rotate-to-landscape prompt (fixed fullscreen overlay) -->
  <div id="rotate-prompt">
    <div class="rp-icon">📱</div>
    <div class="rp-title">ROTATE DEVICE</div>
    <div class="rp-sub">HELI-BOMBER REQUIRES LANDSCAPE MODE</div>
  </div>

  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-item">PILOT: <span id="hud-name">ACE</span></div>
      <div class="hud-item">SCORE: <span id="hud-score">0</span></div>
      <div class="hud-item">LVL: <span id="hud-level-num">1</span></div>
      <div class="hud-item">DIST: <span id="hud-timer">—</span></div>
      <div class="hud-item" id="hud-bombs-wrap">BOMBS: <span id="hud-bombs">—</span></div>
    </div>

    <!-- Level transition -->
    <div id="level-transition">
      <div id="lt-label">LEVEL</div>
      <div id="lt-num">1</div>
      <div id="lt-sub">MISSION START — GO GO GO</div>
    </div>

    <!-- Splash / title screen -->
    <div id="splash">
      <div class="splash-title">HELI-BOMBER</div>
      <div class="splash-sub">CLASSIFIED STRIKE MISSION</div>
      <input id="player-name" class="splash-input" type="text" maxlength="12" placeholder="ENTER PILOT NAME" spellcheck="false" />
      <button id="start-btn" class="btn">LAUNCH MISSION</button>
      <div id="splash-scores">
        <div class="scores-title">LEADERBOARD</div>
        <div id="splash-scores-list"></div>
      </div>
    </div>

    <!-- Heli select -->
    <div id="heli-select">
      <div class="hs-title">SELECT YOUR AIRCRAFT</div>
      <div class="heli-cards" id="heli-cards"></div>
      <button id="launch-btn" class="btn">COMMENCE STRIKE</button>
    </div>

    <!-- Touch controls (mobile d-pad + fire) -->
    <div id="touch-controls">
      <button class="dp-btn" id="dp-up">▲</button>
      <button class="dp-btn" id="dp-down">▼</button>
      <button class="dp-btn" id="dp-left">◀</button>
      <button class="dp-btn" id="dp-right">▶</button>
      <button id="fire-btn">FIRE</button>
    </div>

    <!-- CRT scanline / vignette overlay -->
    <div id="screen-fx"></div>

    <!-- Game over -->
    <div id="gameover">
      <div class="go-title">MISSION FAILED</div>
      <div class="go-score">FINAL SCORE: <span id="go-score-val">0</span></div>
      <div id="go-rank-msg"></div>
      <div id="go-scores-list" style="width:440px; margin-bottom:24px;"></div>
      <button id="restart-btn" class="btn">NEW MISSION</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>

  <script>
    (function () {
      const GAME_W = 920, GAME_H = 520;
      const container   = document.getElementById('game-container');
      const rotatePrompt = document.getElementById('rotate-prompt');
      const touchControls = document.getElementById('touch-controls');

      function isPortrait() {
        // Use innerWidth/Height — works in all mobile browsers
        return window.innerHeight > window.innerWidth;
      }

      function isTouchDevice() {
        return navigator.maxTouchPoints > 0 || 'ontouchstart' in window;
      }

      function resize() {
        const portrait = isPortrait();

        // Show rotate prompt on portrait touch devices; hide otherwise
        if (isTouchDevice() && portrait) {
          rotatePrompt.style.display = 'flex';
          return; // don't scale while portrait
        }
        rotatePrompt.style.display = 'none';

        // Show touch controls only on touch devices in landscape
        if (isTouchDevice()) {
          touchControls.style.display = 'block';
        }

        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const scale = Math.min(vw / GAME_W, vh / GAME_H);

        container.style.transform =
          'translate(-50%, -50%) scale(' + scale + ')';
      }

      window.addEventListener('resize',            resize, { passive: true });
      window.addEventListener('orientationchange', resize, { passive: true });
      resize();
    })();
  </script>
</body>
</html>
